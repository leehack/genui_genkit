name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test example/main.dart

      - name: Analyze
        run: flutter analyze lib test example/main.dart

      - name: Test
        run: flutter test

      - name: Publish dry run
        run: flutter pub publish --dry-run

      - name: Install pana
        run: flutter pub global activate pana

      - name: Check pub score floor
        run: flutter pub global run pana . --exit-code-threshold 150

  flutter-example:
    name: Flutter example
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: example/flutter_hybrid_genui

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  backend-example:
    name: Backend example
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: example/genui_backend_server

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze

      - name: Test
        run: dart test
