name: flutter_hybrid_genui
description: Hybrid Flutter GenUI example powered by local and remote Genkit backends.
publish_to: none

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  genkit: ^0.13.2
  genkit_google_genai: ^0.2.4
  genui: ^0.9.0
  genui_genkit:
    path: ../../packages/genui_genkit
  genui_genkit_llamadart:
    path: ../../packages/genui_genkit_llamadart
  json_schema_builder: ^0.1.3
  llamadart: ^0.6.15
  path: ^1.8.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  lints: ^6.0.0

flutter:
  uses-material-design: true
